<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Connexion - Smart CV Matcher</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; }
        .container { background: white; border-radius: 10px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); width: 400px; padding: 40px; }
        h2 { text-align: center; margin-bottom: 30px; color: #333; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; font-size: 16px; }
        button { width: 100%; padding: 12px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 5px; font-size: 16px; cursor: pointer; transition: 0.3s; }
        button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .message { margin: 15px 0; padding: 10px; border-radius: 5px; display: none; }
        .error { background: #fee; color: #c00; border: 1px solid #fcc; display: block; }
        .success { background: #efe; color: #0a0; border: 1px solid #cfc; display: block; }
        .links { text-align: center; margin-top: 20px; }
        .links a { color: #667eea; text-decoration: none; margin: 0 10px; }
        .links a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <h2>🔐 Connexion</h2>
        <div id="message" class="message"></div>
        <input type="email" id="email" placeholder="Email" autocomplete="off">
        <input type="password" id="password" placeholder="Mot de passe">
        <button onclick="connexion()">Se connecter</button>
        <div class="links">
            <a href="register.html">Créer un compte</a>
            <a href="forgot-password.html">Mot de passe oublié ?</a>
        </div>
    </div>

    <script>
        async function connexion() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const msgDiv = document.getElementById('message');
            
            if (!email || !password) {
                msgDiv.innerHTML = 'Veuillez remplir tous les champs';
                msgDiv.className = 'message error';
                return;
            }
            
            try {
                const response = await fetch('http://localhost:3001/api/auth/connexion/', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({email, password})
                });
                
                const data = await response.json();
                
                if (data.success) {
                    localStorage.setItem('access_token', data.access);
                    localStorage.setItem('refresh_token', data.refresh);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    msgDiv.innerHTML = 'Connexion réussie ! Redirection...';
                    msgDiv.className = 'message success';
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 1500);
                } else {
                    msgDiv.innerHTML = data.message || 'Email ou mot de passe incorrect';
                    msgDiv.className = 'message error';
                }
            } catch (error) {
                msgDiv.innerHTML = 'Erreur de connexion au serveur';
                msgDiv.className = 'message error';
            }
        }
    </script>
</body>
</html>
